apiVersion: apps/v1
kind: Deployment
metadata:
  name: menu-service
  namespace: foodfast
spec:
  replicas: 2
  selector:
    matchLabels:
      app: menu-service
  template:
    metadata:
      labels:
        app: menu-service
    spec:
      containers:
        - name: menu-service
          image: 603108265570.dkr.ecr.us-east-1.amazonaws.com/menu-service:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000