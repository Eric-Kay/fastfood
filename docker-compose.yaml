version: "3.9"

services:
  frontend:
    build:
      context: ./apps/frontend
    ports:
      - "3000:80"
    depends_on:
      - restaurant-service
      - menu-service
      - order-service

  restaurant-service:
    build:
      context: ./apps/restaurant-service
    ports:
      - "8001:8000"

  menu-service:
    build:
      context: ./apps/menu-service
    ports:
      - "8002:8000"

  order-service:
    build:
      context: ./apps/order-service
    environment:
      RABBITMQ_HOST: rabbitmq
    ports:
      - "8003:8000"
    depends_on:
      - rabbitmq

  notification-worker:
    build:
      context: ./apps/notification-worker
    environment:
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - rabbitmq

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: foodfast
      POSTGRES_USER: foodfast
      POSTGRES_PASSWORD: foodfast123
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"