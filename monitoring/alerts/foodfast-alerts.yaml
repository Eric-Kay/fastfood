apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: foodfast-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: foodfast.rules
      rules:
        - alert: FoodFastPodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total{namespace="foodfast"}[10m]) > 3
          for: 5m
          labels:
            severity: warning
            team: devops
          annotations:
            summary: "FoodFast pod is restarting frequently"
            description: "A pod in namespace foodfast has restarted more than 3 times in the last 10 minutes."

        - alert: FoodFastHighCPUUsage
          expr: sum(rate(container_cpu_usage_seconds_total{namespace="foodfast", container!=""}[5m])) by (pod) > 0.8
          for: 10m
          labels:
            severity: warning
            team: devops
          annotations:
            summary: "FoodFast pod high CPU usage"
            description: "One or more FoodFast pods are using high CPU for more than 10 minutes."

        - alert: FoodFastHighMemoryUsage
          expr: (container_memory_working_set_bytes{namespace="foodfast", container!=""} / 1024 / 1024) > 500
          for: 10m
          labels:
            severity: warning
            team: devops
          annotations:
            summary: "FoodFast pod high memory usage"
            description: "One or more FoodFast pods are using more than 500Mi memory."

        - alert: FoodFastDeploymentReplicasMismatch
          expr: kube_deployment_status_replicas_available{namespace="foodfast"} < kube_deployment_spec_replicas{namespace="foodfast"}
          for: 10m
          labels:
            severity: critical
            team: devops
          annotations:
            summary: "FoodFast deployment replicas not matching desired count"
            description: "A deployment in the foodfast namespace does not have the expected available replicas."

        - alert: FoodFastIngressUnavailable
          expr: kube_ingress_info{namespace="foodfast"} < 1
          for: 5m
          labels:
            severity: critical
            team: devops
          annotations:
            summary: "FoodFast ingress missing or unavailable"
            description: "No ingress resource is currently available in the foodfast namespace."